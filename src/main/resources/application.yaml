spring:
  application:
    name: shea-traceability-core
    jwt:
      secret: mySecretKeyForJWTTokenGeneration20240312PleaseChangeThisInProduction
      expiration-ms: 86400000  # 24 hours

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5433/shea
    username: postgres
    password: kosua2468
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
    show-sql: true

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    clean-disabled: false

  # Mail Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Cache Configuration
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500, expireAfterAccess=600s

# =====================================================
# Custom Application Properties (outside spring)
# =====================================================

# File Storage Paths
file:
  upload-dir: ./uploads
  photos: ${file.upload-dir}/photos
  thumbnails: ${file.upload-dir}/thumbnails
  qrcodes: ${file.upload-dir}/qrcodes
  documents: ${file.upload-dir}/documents

# QR Code Configuration
qr:
  code:
    base-url: http://localhost:3000/verify
    size: 300

# =====================================================
# Logging Configuration
# =====================================================
logging:
  level:
    com.shea.traceability: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
  file:
    name: logs/shea-traceability.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# =====================================================
# OpenAPI Documentation
# =====================================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method